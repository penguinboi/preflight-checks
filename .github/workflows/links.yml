# ABOUTME: Checks all markdown files for broken links on push/PR to main and weekly.
# ABOUTME: GitHub Actions workflow that runs lychee link checker against markdown files.
name: Check Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: '--verbose --no-progress **/*.md'
          fail: true
